name: Test and Deploy the app

on: 
  workflow_dispatch:
  push: 
    branches:
      - main 
  pull_request:
    branches:
      - main 

jobs:
  print-tag:
    runs-on: ubuntu-latest
    steps:
      - name: "Print the key"
        run:  |
          echo "Dart Version: $DART_VERSION"
          echo "App Name: $APP_NAME"
        env:
          DART_VERSION: ${{ secrets.DART_VERSION }}
          APP_NAME: ${{ vars.APP_NAME }}
      
 
 
  